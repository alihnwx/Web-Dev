<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook – вход или регистрация</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="main-container">
        <div class="left-content">
            <h1 class="logo">facebook</h1>
            <p>Facebook помогает вам всегда оставаться на связи и общаться со своими знакомыми.</p>
        </div>

        <div class="right-content">
            <div class="login-box">
                <form>
                    <input type="text" placeholder="Электронный адрес или номер телефона" required>
                    <input type="password" placeholder="Пароль" required>
                    <button type="submit" class="login-btn">Вход</button>
                    <a href="#" class="forgot-link">Забыли пароль?</a>
                    <hr>
                    <button type="button" class="create-btn">Создать новый аккаунт</button>
                </form>
            </div>
            <p class="bottom-text"><b>Создать страницу</b> знаменитости, музыкальной группы или компании.</p>
        </div>
    </div>
</body>
</html>
